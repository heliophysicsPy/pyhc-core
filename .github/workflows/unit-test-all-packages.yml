name: Unit Test All Core Packages

on:
  # push:
  #   branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 0 * * *' # daily
  workflow_dispatch:
  pull_request_target:
    types: [opened, synchronize, reopened]

jobs:
  test:
    runs-on: ubuntu-latest  # TODO: make this `["ubuntu-latest", "windows-latest", "macos-latest"]`?

    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]  # TODO: keep up-to-date with PHEP 3

    steps:
    - uses: actions/checkout@v2
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v2
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install core PyHC packages  # Install all dependencies listed in pyproject.toml
      run: |
        python -m pip install --upgrade pip
        pip install .[tests]  # include optional test dependencies


    # ========== HAPI Client ===============================

    - name: Get hapiclient version
      id: hapiclient_version
      run: |
        echo "HAPICLIENT_VERSION=$(python -c 'import hapiclient; print(hapiclient.__version__)')" >> $GITHUB_ENV

      # Mark tests as successful if 90%+ pass.
    - name: Clone and test HAPI Client
      shell: bash
      env:
        HAPICLIENT_VERSION: ${{ env.HAPICLIENT_VERSION }}
      run: |
        # Clone hapiclient repository
        hapiclient_version="${HAPICLIENT_VERSION}"
        if [ -z "$hapiclient_version" ]; then
            echo "hapiclient version not found."
            exit 1
        fi
    
        echo "Cloning hapiclient version $hapiclient_version"
    
        hapiclient_version_tag="${hapiclient_version%%.dev*}"
    
        git clone --branch "v$hapiclient_version_tag" "https://github.com/hapi-server/client-python.git"
        cd client-python
    
        # hapiclient v0.2.7 moved tests from hapiclient/test/ to top-level test/.
        if [ ! -d test ]; then
            echo "Expected hapiclient tests in top-level test/."
            exit 1
        fi

        # Run the tests
        # --deselect test/test_hapitime_reformat.py::test_hapitime_reformat \
        python -m pytest \
          -v -m "not long" test/ \
          --junitxml=test-results.xml \
          || true
    
        # Analyze test results
        python <<EOF
        import sys
        import xml.etree.ElementTree as ET
    
        # Parse the XML file
        tree = ET.parse('test-results.xml')
        root = tree.getroot()
    
        # Initialize counters
        total = errors = failures = skipped = 0
    
        if root.tag == 'testsuites':
            # Sum over all testsuite elements
            for testsuite in root.findall('testsuite'):
                total += int(testsuite.attrib.get('tests', 0))
                errors += int(testsuite.attrib.get('errors', 0))
                failures += int(testsuite.attrib.get('failures', 0))
                skipped += int(testsuite.attrib.get('skipped', 0))
        elif root.tag == 'testsuite':
            # Single testsuite
            total = int(root.attrib.get('tests', 0))
            errors = int(root.attrib.get('errors', 0))
            failures = int(root.attrib.get('failures', 0))
            skipped = int(root.attrib.get('skipped', 0))
        else:
            print(f'Unexpected root tag: {root.tag}')
            sys.exit(1)
    
        # Count skipped tests as passed
        passed = total - errors - failures
    
        pass_rate = (passed / total) * 100 if total > 0 else 0
    
        print(f'Total tests: {total}')
        print(f'Passed: {passed} (including skipped)')
        print(f'Failures: {failures}')
        print(f'Errors: {errors}')
        print(f'Skipped: {skipped}')
        print(f'Pass rate: {pass_rate:.2f}%')
    
        if pass_rate >= 90:
            print('Pass rate is above 90%, acceptable.')
            sys.exit(0)
        else:
            print('Pass rate is below threshold of 90%.')
            sys.exit(1)
        EOF


    # ========== Kamodo ===============================

    # Kamodo package has no unit tests
    # - name: Clone and test kamodo
    #   run: |
    #     git clone https://github.com/nasa/Kamodo.git
    #     cd Kamodo
    #     pip install -r requirements.txt
    #     # pip install .
    #     pytest
    

    # ========== PlasmaPy ===============================

    - name: Get PlasmaPy version
      id: plasmapy_version
      run: |
        echo "PLASMAPY_VERSION=$(python -c 'import plasmapy; print(plasmapy.__version__)')" >> $GITHUB_ENV

      # Mark tests as successful if 98%+ pass
    - name: Clone and test PlasmaPy
      if: matrix.python-version != '3.9'  # Exclude PlasmaPy for Python 3.9
      shell: bash
      env:
        PLASMAPY_VERSION: ${{ env.PLASMAPY_VERSION }}
      run: |
        # Clone matching version of PlasmaPy repository
        plasmapy_version="${PLASMAPY_VERSION}"
        if [ -z "$plasmapy_version" ]; then
            echo "PlasmaPy version not found."
            exit 1
        fi

        echo "Cloning PlasmaPy version $plasmapy_version"

        plasmapy_version_tag="${plasmapy_version%%.dev*}"

        git clone --branch "v$plasmapy_version_tag" "https://github.com/PlasmaPy/PlasmaPy.git"
        cd PlasmaPy

        # Install PlasmaPy test dependencies across packaging styles:
        # - modern releases use PEP 735 dependency groups
        # - older releases expose a tests extra
        if grep -q '^\[dependency-groups\]' pyproject.toml; then
          python -m pip install --group test
        else
          python -m pip install ".[tests]"
        fi

        # Run the tests (ignoring tests that require GH_TOKEN)
        python -m pytest \
          --junitxml=test-results.xml \
          --continue-on-collection-errors \
          --ignore=tests/utils/data/test_downloader.py || true

        # Analyze test results
        python <<EOF
        import sys
        import xml.etree.ElementTree as ET

        # Parse the XML file
        tree = ET.parse('test-results.xml')
        root = tree.getroot()

        # Initialize counters
        total = errors = failures = skipped = 0

        if root.tag == 'testsuites':
            # Sum over all testsuite elements
            for testsuite in root.findall('testsuite'):
                total += int(testsuite.attrib.get('tests', 0))
                errors += int(testsuite.attrib.get('errors', 0))
                failures += int(testsuite.attrib.get('failures', 0))
                skipped += int(testsuite.attrib.get('skipped', 0))
        elif root.tag == 'testsuite':
            # Single testsuite
            total = int(root.attrib.get('tests', 0))
            errors = int(root.attrib.get('errors', 0))
            failures = int(root.attrib.get('failures', 0))
            skipped = int(root.attrib.get('skipped', 0))
        else:
            print(f'Unexpected root tag: {root.tag}')
            sys.exit(1)

        # Count skipped tests as passed
        passed = total - errors - failures

        pass_rate = (passed / total) * 100 if total > 0 else 0

        print(f'Total tests: {total}')
        print(f'Passed: {passed} (including skipped)')
        print(f'Failures: {failures}')
        print(f'Errors: {errors}')
        print(f'Skipped: {skipped}')
        print(f'Pass rate: {pass_rate:.2f}%')

        if pass_rate >= 98:
            print('Pass rate is above 98%, acceptable.')
            sys.exit(0)
        else:
            print('Pass rate is below threshold of 98%.')
            sys.exit(1)
        EOF


    # ========== pysat ===============================

    - name: Get pysat version
      id: pysat_version
      run: |
        # Read the version from package metadata rather than `import pysat`, because
        # importing pysat prints startup output to stdout that breaks the $GITHUB_ENV file.
        echo "PYSAT_VERSION=$(python -c 'from importlib.metadata import version; print(version("pysat"))')" >> $GITHUB_ENV

    # TODO: Remove this skip-guard (the "Notice" step and the `if:` on "Test pysat" below)
    # once pysat ships a release newer than 3.2.2. Background: pysat 3.2.2 has a known bug
    # that drives its test suite under the pass-rate threshold. Fix: https://github.com/pysat/pysat/pull/1222.
    - name: Notice — pysat tests skipped
      if: env.PYSAT_VERSION == '3.2.2'
      run: |
        echo "::warning::Skipping pysat tests: installed version is 3.2.2, which has a known test-suite bug. Tests will resume automatically once a newer release is published on PyPI. See https://github.com/pysat/pysat/pull/1222."

      # Mark tests as successful if 98%+ pass
    - name: Test pysat
      if: env.PYSAT_VERSION != '3.2.2'  # TODO: drop this guard once pysat > 3.2.2 is on PyPI
      continue-on-error: false
      shell: bash
      run: |
        # Create a directory for pysat data
        mkdir -p pysatData
        
        # Set the directory for pysat data
        python -c "import pysat; pysat.params['data_dirs'] = ['$(pwd)/pysatData']"
        
        # Run pysat's unit tests from the installed package and output results to XML
        pytest --pyargs pysat.tests --junitxml=test-results.xml || true

        # Calculate pass rate and determine exit code
        python <<EOF
        import sys
        import xml.etree.ElementTree as ET
    
        # Parse the XML file
        tree = ET.parse('test-results.xml')
        root = tree.getroot()
    
        # Initialize counters
        total = errors = failures = skipped = 0
    
        if root.tag == 'testsuites':
            # Sum over all testsuite elements
            for testsuite in root.findall('testsuite'):
                total += int(testsuite.attrib.get('tests', 0))
                errors += int(testsuite.attrib.get('errors', 0))
                failures += int(testsuite.attrib.get('failures', 0))
                skipped += int(testsuite.attrib.get('skipped', 0))
        elif root.tag == 'testsuite':
            # Single testsuite
            total = int(root.attrib.get('tests', 0))
            errors = int(root.attrib.get('errors', 0))
            failures = int(root.attrib.get('failures', 0))
            skipped = int(root.attrib.get('skipped', 0))
        else:
            print(f'Unexpected root tag: {root.tag}')
            sys.exit(1)
    
        # Count skipped tests as passed
        passed = total - errors - failures
    
        pass_rate = (passed / total) * 100 if total > 0 else 0
    
        print(f'Total tests: {total}')
        print(f'Passed: {passed} (including skipped)')
        print(f'Failures: {failures}')
        print(f'Errors: {errors}')
        print(f'Skipped: {skipped}')
        print(f'Pass rate: {pass_rate:.2f}%')
    
        if pass_rate >= 98:
            print('Pass rate is above 98%, acceptable.')
            sys.exit(0)
        else:
            print('Pass rate is below threshold of 98%.')
            sys.exit(1)
        EOF


