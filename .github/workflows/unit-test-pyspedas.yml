name: Unit Test pySPEDAS

on:
  # push:
  #   branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 0 * * *' # daily
  workflow_dispatch:
  pull_request_target:
    types: [opened, synchronize, reopened]

jobs:
  test:
    runs-on: ubuntu-latest  # TODO: make this `["ubuntu-latest", "windows-latest", "macos-latest"]`?

    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]  # TODO: keep up-to-date with PHEP 3

    steps:
    - uses: actions/checkout@v2
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v2
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install core PyHC packages  # Install all dependencies listed in pyproject.toml
      run: |
        python -m pip install --upgrade pip
        pip install .[tests]  # include optional test dependencies 

    # Mark tests as successful if 75%+ pass (not 90-98% because of known failing tests)
    - name: Test pySPEDAS (quick tests)
      shell: bash
      env:
        SPEDAS_DATA_DIR: data
        PYTPLOT_LOGGING_LEVEL: error
      run: |
        # NOTE: Full pySPEDAS unit test suite disabled (too slow for GH Actions; jobs often get cancelled).
        # To re-enable the full suite:
        # pytest --pyargs pyspedas --junitxml=test-results.xml
    
        tests=(
          pyspedas.utilities.tests.test_find_ip_address
          pyspedas.projects.elfin.tests.test_epd_l2
          pyspedas.cdagui_tools.tests.test_cdagui
          pyspedas.projects.akebono.tests.test_akebono
          pyspedas.projects.ace.tests.test_ace
          pyspedas.projects.cluster.tests.test_cluster
          pyspedas.projects.cluster.tests.test_cluster_uri
          pyspedas.projects.themis.tests.test_themis_tplot_time
          pyspedas.projects.barrel.tests.test_barrel
          pyspedas.projects.elfin.tests.test_epd_l1
          pyspedas.projects.elfin.tests.test_state
          pyspedas.projects.elfin.tests.test_elfin
          pyspedas.projects.elfin.tests.test_epd_calibration
          pyspedas.projects.soho.tests.test_soho
          pyspedas.projects.de2.tests.test_de2
          pyspedas.projects.st5.tests.test_st5
          pyspedas.projects.lanl.tests.test_lanl
          pyspedas.cotrans_tools.tests.test_quaternions
          pyspedas.projects.cnofs.tests.test_cnofs
          pyspedas.projects.kompsat.tests.test_kompsat
          pyspedas.hapi_tools.tests.test_hapi
          pyspedas.projects.noaa.tests.test_noaa
          pyspedas.particles.tests.test_particles
          pyspedas.projects.dscovr.tests.test_dscovr
          pyspedas.utilities.tests.test_utilities_download
          pyspedas.utilities.tests.test_utilities_misc
          pyspedas.utilities.tests.test_utilities_download_uri
          pyspedas.utilities.tests.test_xdegap
          pyspedas.utilities.tests.test_math
          pyspedas.utilities.tests.test_utilities_tplot_wildcard
          pyspedas.utilities.tests.test_utilities_plot
          pyspedas.utilities.tests.test_utilities_time
          pyspedas.utilities.tests.test_utilities_libs
          pyspedas.cotrans_tools.tests.test_cotrans
          pyspedas.cotrans_tools.tests.test_minvar
          pyspedas.cotrans_tools.tests.test_fac
          pyspedas.cotrans_tools.tests.test_lmn
          pyspedas.projects.csswe.tests.test_csswe
          pyspedas.projects.equator_s.tests.test_equator_s
          pyspedas.projects.image.tests.test_image
          pyspedas.projects.psp.tests.test_psp
          pyspedas.projects.rbsp.tests.test_rbsp
          pyspedas.projects.stereo.tests.test_stereo
          pyspedas.projects.twins.tests.test_twins
          pyspedas.projects.wind.tests.test_wind
          pyspedas.projects.poes.tests.test_poes
          pyspedas.projects.polar.tests.test_polar
          pyspedas.geopack.tests.test_geopack
          pyspedas.geopack.tests.test_geopack_idl_validation
          pyspedas.projects.geotail.tests.test_geotail
          pyspedas.analysis.tests.test_analysis
          pyspedas.analysis.tests.test_twavpol
          pyspedas.analysis.tests.test_wavelet
          pyspedas.analysis.tests.test_magnetic_nulls
          pyspedas.projects.fast.tests.test_fast
          pyspedas.projects.omni.tests.test_omni
          pyspedas.projects.themis.tests.test_themis
          pyspedas.projects.goes.tests.test_goes
          pyspedas.projects.mica.tests.test_mica
          pyspedas.projects.ulysses.tests.test_ulysses
          pyspedas.projects.solo.tests.test_solo
          pyspedas.projects.kyoto.tests.test_kyoto
          pyspedas.projects.swarm.tests.test_swarm
          pyspedas.projects.themis.tests.test_themis_check_args
          pyspedas.projects.themis.tests.test_themis_autoload_support
          pyspedas.projects.themis.tests.test_themis_cal_fit
          pyspedas.projects.themis.tests.test_themis_dsl_cotrans
          pyspedas.projects.themis.tests.test_themis_lunar_cotrans
          pyspedas.projects.themis.tests.test_themis_spinmodel
          pyspedas.projects.themis.tests.test_themis_state
          pyspedas.projects.themis.tests.test_themis_scpot2dens
        )
    
        pytest --pyargs "${tests[@]}" --junitxml=test-results.xml || true

        # Calculate pass rate and determine exit code
        python <<EOF
        import sys
        import xml.etree.ElementTree as ET
    
        # Parse the XML file
        tree = ET.parse('test-results.xml')
        root = tree.getroot()
    
        # Initialize counters
        total = errors = failures = skipped = 0
    
        if root.tag == 'testsuites':
            # Sum over all testsuite elements
            for testsuite in root.findall('testsuite'):
                total += int(testsuite.attrib.get('tests', 0))
                errors += int(testsuite.attrib.get('errors', 0))
                failures += int(testsuite.attrib.get('failures', 0))
                skipped += int(testsuite.attrib.get('skipped', 0))
        elif root.tag == 'testsuite':
            # Single testsuite
            total = int(root.attrib.get('tests', 0))
            errors = int(root.attrib.get('errors', 0))
            failures = int(root.attrib.get('failures', 0))
            skipped = int(root.attrib.get('skipped', 0))
        else:
            print(f'Unexpected root tag: {root.tag}')
            sys.exit(1)
    
        # Count skipped tests as passed
        passed = total - errors - failures
    
        pass_rate = (passed / total) * 100 if total > 0 else 0
    
        print(f'Total tests: {total}')
        print(f'Passed: {passed} (including skipped)')
        print(f'Failures: {failures}')
        print(f'Errors: {errors}')
        print(f'Skipped: {skipped}')
        print(f'Pass rate: {pass_rate:.2f}%')
    
        if pass_rate >= 75:
            print('Pass rate is above 75%, acceptable.')
            sys.exit(0)
        else:
            print('Pass rate is below threshold of 75%.')
            sys.exit(1)
        EOF
